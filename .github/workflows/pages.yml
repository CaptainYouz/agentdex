name: Deploy landing to GitHub Pages

on:
  push:
    branches:
      - main
    paths:
      - docs/**
      - .github/workflows/pages.yml
  workflow_dispatch:

# Allow the workflow to publish a Pages deployment.
permissions:
  contents: read
  pages: write
  id-token: write

# One in-flight deployment at a time; don't cancel a running publish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # Injects the PostHog key into docs/*.html at deploy time, replacing the
      # <!-- AGENTDEX_POSTHOG --> placeholder. The key is a public client key and
      # only ever lands in the served HTML — never committed to the repo.
      - name: Bake PostHog analytics
        env:
          VITE_POSTHOG_KEY: ${{ secrets.VITE_POSTHOG_KEY }}
          VITE_POSTHOG_HOST: ${{ secrets.VITE_POSTHOG_HOST || 'https://us.i.posthog.com' }}
        run: node docs/scripts/bake-posthog.mjs

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
